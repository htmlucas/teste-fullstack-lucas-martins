services:
    # image project
    app:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: laravel_app
      restart: unless-stopped
      working_dir: /var/www/
      volumes:
        - ./:/var/www
      depends_on:
        - mysql
        - redis
      networks:
        - laravel-12

    # nginx
    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        restart: unless-stopped
        ports: 
          - "8000:80"
        volumes: 
          - ./:/var/www
          - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks: 
            - laravel-12

    # db mysql
    mysql:
        image: mysql:8.4
        container_name: laravel_mysql
        restart: unless-stopped
        environment:
          MYSQL_DATABASE: ${DB_DATABASE}
          MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
          MYSQL_PASSWORD: ${DB_PASSWORD}
          MYSQL_USER: ${DB_USERNAME}
        volumes:
          - mysql_data:/var/lib/mysql
        ports:
          - "3306:3306"
        networks:
          - laravel-12

    # worker
    worker:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: laravel_worker
      restart: unless-stopped
      command: >
        sh -c "php artisan queue:heartbeat &
              php artisan queue:work redis --queue=default --tries=3 --sleep=3 --timeout=90"
      working_dir: /var/www/
      volumes:
        - ./:/var/www
      depends_on:
        - app
        - mysql
        - redis
      networks:
        - laravel-12

    # redis
    redis:
        image: redis:7-alpine
        container_name: laravel_redis
        restart: unless-stopped
        ports:
          - "6379:6379"
        networks:
            - laravel-12

    n8n:
      image: n8nio/n8n
      container_name: laravel_n8n
      ports:
        - "5678:5678"
      environment:
        N8N_BASIC_AUTH_ACTIVE: true
        N8N_BASIC_AUTH_USER: ${N8N_USER}
        N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      volumes:
        - n8n_data:/home/node/.n8n
      networks:
        - laravel-12

volumes:
  mysql_data:
  n8n_data:

networks:
    laravel-12:
        driver: bridge